services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: autovault
      POSTGRES_USER: autovault
      POSTGRES_PASSWORD: autovault
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autovault"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    environment:
      DATABASE_URL: postgres://autovault:autovault@db:5432/autovault
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      PORT: 8080
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: .
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata:
